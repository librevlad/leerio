services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      LEERIO_DATA: /data
      LEERIO_BOOKS: /books
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/data
      - ./books:/books:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/config/constants"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  app:
    build: ./app
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
