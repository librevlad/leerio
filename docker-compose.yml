services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      LEERIO_DATA: /data
      LEERIO_BOOKS: /books
      TTS_OPENAI_BASE_URL: http://openedai-speech:8000/v1
      TTS_OPENAI_API_KEY: sk-unused
      TTS_OPENAI_MODEL: tts-1
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/data
      - ./books:/books:ro
    depends_on:
      openedai-speech:
        condition: service_healthy
    networks:
      - backend
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/config/constants"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  openedai-speech:
    image: ghcr.io/matatonic/openedai-speech
    environment:
      TTS_HOME: voices
      HF_HOME: voices
    volumes:
      - tts_voices:/app/voices
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  app:
    build:
      context: ./app
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    depends_on:
      server:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./landing:/srv/landing:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped

networks:
  backend:
  frontend:

volumes:
  caddy_data:
  caddy_config:
  tts_voices:
