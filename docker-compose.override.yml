services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app/server
      - ./data:/data
      - ./books:/books:ro
    command: uvicorn server.api:app --reload --host 0.0.0.0 --port 8000

  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./app:/app
      - /app/node_modules
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    depends_on:
      server:
        condition: service_started
    healthcheck:
      disable: true

  caddy:
    profiles: ["production"]
