version: 2
updates:
  - package-ecosystem: pip
    directory: /server
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(py):"

  - package-ecosystem: npm
    directory: /app
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(js):"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: "deps(ci):"
