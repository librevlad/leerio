name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r server/requirements-dev.txt
      - name: Lint
        run: ruff check server/
      - name: Format check
        run: ruff format --check server/
      - name: Test
        run: pytest --cov=server --cov-report=term-missing

  app-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install
        working-directory: app
        run: npm ci
      - name: Lint
        working-directory: app
        run: npx eslint src/
      - name: Format check
        working-directory: app
        run: npx prettier --check src/
      - name: Test
        working-directory: app
        run: npx vitest run --coverage
      - name: Type check
        working-directory: app
        run: npx vue-tsc --noEmit
      - name: Build
        working-directory: app
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [server-lint, app-build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements.txt
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install Python deps
        run: pip install -r server/requirements.txt
      - name: Install Node deps
        working-directory: app
        run: npm ci
      - name: Install Chromium
        working-directory: app
        run: npx playwright install chromium --with-deps
      - name: Create data dirs
        run: mkdir -p data books
      - name: Run E2E tests
        working-directory: app
        env:
          LEERIO_DEV: "1"
        run: npx playwright test --grep-invert "@librivox|@needs-books"
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 7

  apk-build:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [app-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install
        working-directory: app
        run: npm ci
      - name: Build web
        working-directory: app
        run: npm run build
      - name: Cap sync
        working-directory: app
        run: npx cap sync android
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build debug APK
        working-directory: app/android
        run: chmod +x gradlew && ./gradlew assembleDebug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: leerio-debug-apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
      - name: Create/update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: Latest APK Build
          body: "Debug APK built from ${{ github.sha }}"
          prerelease: true
          files: app/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [server-lint, app-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/leerio
            PREV_SHA=$(git rev-parse HEAD)
            git pull origin main
            sed -i 's|CORS_ORIGINS=https://leerio.app|CORS_ORIGINS=https://app.leerio.app|' .env
            docker compose build --pull
            docker compose up -d
            echo "Waiting for services to start..."
            sleep 15
            for i in 1 2 3; do
              if curl -sf https://app.leerio.app/api/config/constants > /dev/null; then
                echo "Health check passed (attempt $i)"
                exit 0
              fi
              echo "Health check failed (attempt $i/3), retrying in 10s..."
              sleep 10
            done
            echo "All health checks failed — rolling back to $PREV_SHA"
            git checkout "$PREV_SHA"
            docker compose build --pull
            docker compose up -d
            exit 1
