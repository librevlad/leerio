name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r server/requirements-dev.txt
      - name: Lint
        run: ruff check server/
      - name: Format check
        run: ruff format --check server/
      - name: Test
        run: pytest --cov=server --cov-report=term-missing

  app-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install
        working-directory: app
        run: npm ci
      - name: Lint
        working-directory: app
        run: npx eslint src/
      - name: Format check
        working-directory: app
        run: npx prettier --check src/
      - name: Test
        working-directory: app
        run: npx vitest run --coverage
      - name: Type check
        working-directory: app
        run: npx vue-tsc --noEmit
      - name: Build
        working-directory: app
        run: npm run build

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [server-lint, app-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/leerio
            PREV_SHA=$(git rev-parse HEAD)
            git pull origin main
            docker compose up --build -d
            echo "Waiting for services to start..."
            sleep 15
            for i in 1 2 3; do
              if curl -sf https://app.leerio.app/api/config/constants > /dev/null; then
                echo "Health check passed (attempt $i)"
                exit 0
              fi
              echo "Health check failed (attempt $i/3), retrying in 10s..."
              sleep 10
            done
            echo "All health checks failed — rolling back to $PREV_SHA"
            git checkout "$PREV_SHA"
            docker compose up --build -d
            exit 1
