name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "landing/**"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "landing/**"
      - ".gitignore"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r server/requirements-dev.txt
      - name: Lint
        run: ruff check server/
      - name: Format check
        run: ruff format --check server/
      - name: Test
        run: pytest --cov=server --cov-report=term-missing

  app-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install
        working-directory: app
        run: npm ci
      - name: Lint
        working-directory: app
        run: npx eslint src/
      - name: Format check
        working-directory: app
        run: npx prettier --check src/
      - name: Test
        working-directory: app
        run: npx vitest run --coverage
      - name: Type check
        working-directory: app
        run: npx vue-tsc --noEmit
      - name: Build
        working-directory: app
        run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: app/dist
          retention-days: 1

  e2e:
    runs-on: ubuntu-latest
    needs: [server-lint, app-build]
    if: |
      !contains(github.event.head_commit.message, '[skip e2e]')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements.txt
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install Python deps
        run: pip install -r server/requirements.txt
      - name: Install Node deps
        working-directory: app
        run: npm ci
      - name: Install Chromium
        working-directory: app
        run: npx playwright install chromium --with-deps
      - name: Create data dirs
        run: mkdir -p data books
      - name: Run E2E tests
        working-directory: app
        env:
          LEERIO_DEV: "1"
        run: npx playwright test --grep-invert "@librivox|@needs-books"
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 7

  apk-build:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [app-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: app-dist
          path: app/dist
      - name: Install Capacitor deps
        working-directory: app
        run: npm ci
      - name: Cap sync
        working-directory: app
        run: npx cap sync android
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build debug APK
        working-directory: app/android
        run: chmod +x gradlew && ./gradlew assembleDebug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: leerio-debug-apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
      - name: Rename APK
        run: cp app/android/app/build/outputs/apk/debug/app-debug.apk app/android/app/build/outputs/apk/debug/leerio.apk
      - name: Create/update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: Latest APK Build
          body: "APK built from ${{ github.sha }}"
          prerelease: true
          files: app/android/app/build/outputs/apk/debug/leerio.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [server-lint, app-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: S3_ENDPOINT,S3_ACCESS_KEY,S3_SECRET_KEY,S3_BUCKET,GOOGLE_CLIENT_ID
          script: |
            cd /opt/leerio
            # Fix ownership on git-tracked files that Docker may have chowned
            sudo chown -Rf "$(id -u):$(id -g)" data/ 2>/dev/null || true
            # Inject secrets from CI into .env (VPS .env may not have them)
            for var in S3_ENDPOINT S3_ACCESS_KEY S3_SECRET_KEY S3_BUCKET GOOGLE_CLIENT_ID; do
              val=$(eval echo "\$$var")
              if [ -n "$val" ]; then
                sed -i "/^${var}=/d" .env 2>/dev/null
                echo "${var}=${val}" >> .env
              fi
            done
            bash scripts/deploy.sh --local
