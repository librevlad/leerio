name: VPS Setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Download books and upload via SSH
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          # Download release asset
          gh release download books-upload --repo librevlad/leerio --pattern "test-books.tar.gz" --dir .
          ls -lh test-books.tar.gz

          # Setup SSH key
          mkdir -p ~/.ssh
          echo "$VPS_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Upload via scp
          scp -i ~/.ssh/vps_key test-books.tar.gz "$VPS_USER@$VPS_HOST:/tmp/test-books.tar.gz"
          echo ">>> Upload complete"

      - name: Setup SSH access and extract books
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo ">>> user=$(whoami) home=$HOME host=$(hostname)"
            echo ">>> id: $(id)"

            # ── 1. Add SSH public key ──────────────────────────────────
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            PUB_KEY="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKhYGTAbB1TMNsntTXTZFhGj6yorDy1+Sdp3LG7EiEsQ user@User-PC"
            grep -qF "$PUB_KEY" ~/.ssh/authorized_keys 2>/dev/null || echo "$PUB_KEY" >> ~/.ssh/authorized_keys
            chmod 600 ~/.ssh/authorized_keys
            echo ">>> SSH key added to ~/.ssh/authorized_keys"

            # ── 2. Check sudo access ───────────────────────────────────
            if sudo -n true 2>/dev/null; then
              echo ">>> sudo available (NOPASSWD)"
              HAS_SUDO=1
            else
              echo ">>> sudo requires password — skipping password/sshd setup"
              HAS_SUDO=0
            fi

            # ── 3. Enable password auth + set password (if sudo) ──────
            if [ "$HAS_SUDO" = "1" ]; then
              sudo sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
              sudo sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
              sudo systemctl restart sshd || sudo systemctl restart ssh
              NEW_PASS=$(openssl rand -base64 12)
              echo "$(whoami):$NEW_PASS" | sudo chpasswd
              echo "=========================================="
              echo "NEW PASSWORD: $NEW_PASS"
              echo "=========================================="
              # Also set root password
              echo "root:$NEW_PASS" | sudo chpasswd 2>/dev/null || true
            fi

            # ── 4. Extract books ───────────────────────────────────────
            cd /opt/leerio
            mkdir -p books/Саморазвитие books/Бизнес 2>/dev/null || true
            if [ -f /tmp/test-books.tar.gz ]; then
              tar xzf /tmp/test-books.tar.gz -C books/ 2>/dev/null || sudo tar xzf /tmp/test-books.tar.gz -C books/
              rm -f /tmp/test-books.tar.gz
              echo ">>> Books extracted:"
              ls books/Саморазвитие/ books/Бизнес/ 2>/dev/null || ls books/
            else
              echo ">>> No archive at /tmp/test-books.tar.gz"
              ls /tmp/*.tar.gz 2>/dev/null || echo ">>> No tar.gz in /tmp"
            fi

            # ── 5. Print SSH connection info ───────────────────────────
            echo ""
            echo ">>> To connect: ssh $(whoami)@$(hostname -I | awk '{print $1}')"
