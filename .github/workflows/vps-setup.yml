name: VPS Setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Download books archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download books-upload --repo librevlad/leerio --pattern "test-books.tar.gz" --dir /tmp
          ls -lh /tmp/test-books.tar.gz

      - name: Upload books to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: /tmp/test-books.tar.gz
          target: /tmp/
          strip_components: 2

      - name: Setup SSH and extract books
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # ── 1. Add SSH public key ──────────────────────────────────
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            PUB_KEY="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKhYGTAbB1TMNsntTXTZFhGj6yorDy1+Sdp3LG7EiEsQ user@User-PC"
            grep -qF "$PUB_KEY" ~/.ssh/authorized_keys 2>/dev/null || echo "$PUB_KEY" >> ~/.ssh/authorized_keys
            chmod 600 ~/.ssh/authorized_keys
            echo ">>> SSH key added"

            # ── 2. Enable password auth ────────────────────────────────
            sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
            sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
            systemctl restart sshd || systemctl restart ssh
            echo ">>> Password auth enabled"

            # ── 3. Set new password ────────────────────────────────────
            NEW_PASS=$(openssl rand -base64 12)
            echo "root:$NEW_PASS" | chpasswd
            echo "=========================================="
            echo "NEW ROOT PASSWORD: $NEW_PASS"
            echo "=========================================="

            # ── 4. Extract books ───────────────────────────────────────
            cd /opt/leerio
            mkdir -p books
            tar xzf /tmp/test-books.tar.gz -C books/
            rm -f /tmp/test-books.tar.gz
            echo ">>> Books extracted:"
            ls books/Саморазвитие/ books/Бизнес/ 2>/dev/null || ls books/
